{% extends 'core/base.html' %}

{% block titulo %}
Lista de Tareas
{% endblock titulo %}

{% block content %}

<h1 class="mb-4">Lista de Tareas</h1>

<form class="d-flex mb-3" method="get">
    <input class="form-control me-2" type="text" name="consulta" placeholder="Buscar...">

    <button class="btn btn-outline-success me-2" type="submit">
        Buscar
    </button>

    <a class="btn btn-outline-secondary" href="{% url 'core:tarea_list' %}">
        Limpiar
    </a>
</form>

<table class="table table-striped table-hover">

    <thead class="table-dark">
        <tr>
            <th>tarea</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

        {% for tarea in object_list %}
        <tr>

            <td>{{ tarea.nombre }}</td>

            <td>

                <a class="btn btn-info btn-sm" href="{% url 'core:tarea_detail' tarea.pk %}">
                    Ver
                </a>

                <a class="btn btn-warning btn-sm" href="{% url 'core:tarea_update' tarea.pk %}">
                    Editar
                </a>

                <a class="btn btn-danger btn-sm" href="{% url 'core:tarea_delete' tarea.pk %}">
                    Borrar
                </a>

            </td>

        </tr>
        {% endfor %}

    </tbody>

</table>

<div class="mt-3 d-flex gap-2">

    <a class="btn btn-success" href="{% url 'core:tarea_create' %}">
        Crear
    </a>

    <a class="btn btn-secondary" href="{% url 'core:index' %}">
        Volver
    </a>

</div>

{% endblock content %}
