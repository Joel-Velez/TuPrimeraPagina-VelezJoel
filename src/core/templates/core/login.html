{% extends 'core/base.html' %}

{% block titulo %}
Iniciar sesión
{% endblock titulo %}

{% block content %}

    <div class="row justify-content-center">

        <div class="col-md-4">

            <div class="card shadow">

                <div class="card-body">

                    <h3 class="text-center mb-4">Iniciar sesión</h3>

                    <form method="post">
                        {% csrf_token %}

                         {{ form.as_p }}

                        <div class="d-grid">
                            <button class="btn btn-primary" type="submit">
                                Ingresar
                            </button>
                         </div>

                    </form>

                    <div class="text-center mt-3">

                        <p>
                            ¿No tienes cuenta?
                            <a href="{% url 'core:register' %}">Registrarse</a>
                            </p>

                    </div>

               </div>
            </div>

        </div>
    </div>

{% endblock content %}
