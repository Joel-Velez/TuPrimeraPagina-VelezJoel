{% extends 'core/base.html' %}

{% block titulo %}
Lista de Empleados
{% endblock titulo %}

{% block content %}

<h1 class="mb-4">Lista de Empleados</h1>

<form class="d-flex mb-3" method="get">
    <input class="form-control me-2" type="text" name="consulta" placeholder="Buscar...">

    <button class="btn btn-outline-success me-2" type="submit">
        Buscar
    </button>

    <a class="btn btn-outline-secondary" href="{% url 'core:empleado_list' %}">
        Limpiar
    </a>
</form>

<table class="table table-striped table-hover">

    <thead class="table-dark">
        <tr>
            <th>Cargo</th>
            <th>Acciones</th>
        </tr>
    </thead>

    <tbody>

        {% for empleado in object_list %}
        <tr>

            <td>{{ empleado.nombre }}</td>

            <td>

                <a class="btn btn-info btn-sm" href="{% url 'core:empleado_detail' empleado.pk %}">
                    Ver
                </a>

                <a class="btn btn-warning btn-sm" href="{% url 'core:empleado_update' empleado.pk %}">
                    Editar
                </a>

                <a class="btn btn-danger btn-sm" href="{% url 'core:empleado_delete' empleado.pk %}">
                    Borrar
                </a>

            </td>

        </tr>
        {% endfor %}

    </tbody>

</table>

<div class="mt-3 d-flex gap-2">

    <a class="btn btn-success" href="{% url 'core:empleado_create' %}">
        Crear
    </a>

    <a class="btn btn-secondary" href="{% url 'core:index' %}">
        Volver
    </a>

</div>

{% endblock content %}
