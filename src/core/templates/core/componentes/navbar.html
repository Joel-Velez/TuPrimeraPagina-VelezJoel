{% load static %}

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">

        <!-- LOGO -->
        <a class="navbar-brand" href="{% url 'core:index' %}">
            <img src="{% static 'logo/imagen.png' %}" alt="logo" height="60">
        </a>

        <!-- BOTON RESPONSIVE -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContenido">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContenido">

            <!-- MENU IZQUIERDA -->
            <ul class="navbar-nav me-auto">

                {% if user.is_authenticated %}
                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:cargo_list' %}">Cargo</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:empleado_list' %}">Empleado</a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:tarea_list' %}">Tarea</a>
                </li>
                {% endif %}

            </ul>

            <!-- MENU DERECHA -->
            <ul class="navbar-nav ms-auto">

                {% if user.is_authenticated %}

                <li class="nav-item">
                    <span class="navbar-text text-white me-3">
                        {{ user.username }}
                    </span>
                </li>

                <li class="nav-item">
                    <form action="{% url 'core:logout' %}" method="post">
                        {% csrf_token %}
                        <button class="btn btn-outline-light btn-sm" type="submit">
                            Cerrar Sesión
                        </button>
                    </form>
                </li>

                {% else %}

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'core:login' %}">
                        Iniciar Sesión
                    </a>
                </li>

                {% endif %}

            </ul>

        </div>
    </div>
</nav>
